<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBook - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 左侧内容区域 -->
        <div class="left-section">
            <!-- Header -->
            <header class="header">
                <button class="settings-btn" aria-label="Settings">
                    <img src="assets/settings-icon.svg" alt="Settings" class="settings-icon">
                </button>
                <div class="logo">
                    <span class="logo-text">MindBook</span>
                </div>
            </header>

            <!-- 主要内容 -->
            <main class="main-content">
                <!-- 欢迎文字 -->
                <div class="welcome-section">
                    <h2 class="welcome-text">welcome</h2>
                    <div class="brand-line">
                        <span class="to-text">to</span>
                        <h1 class="brand-name">MindBook</h1>
                    </div>
                    <p class="tagline">Your smart intelligent appointment system</p>
                </div>

                <!-- 登录表单 -->
                <div class="login-form">
                    <!-- Google 登录 -->
                    <button class="social-btn google-btn">
                        <svg class="social-icon" viewBox="0 0 24 24" width="24" height="24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>Continue With Google</span>
                    </button>

                    <!-- 手机登录 -->
                    <button class="social-btn phone-btn">
                        <svg class="social-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <span>Continue With Phone</span>
                    </button>

                    <!-- 分隔线 -->
                    <div class="divider">
                        <span class="divider-line"></span>
                        <span class="divider-text">OR</span>
                        <span class="divider-line"></span>
                    </div>

                    <!-- 邮箱输入 -->
                    <div class="email-input-wrapper">
                        <input 
                            type="email" 
                            class="email-input" 
                            placeholder="Enter your email"
                            id="emailInput"
                        >
                    </div>

                    <!-- 继续按钮 -->
                    <button class="continue-btn" id="continueBtn">
                        Continue
                    </button>
                </div>
            </main>
        </div>

        <!-- 右侧图片区域 -->
        <div class="right-section">
            <div class="hero-image">
                <img src="right_pic.png" alt="MindBook Hero" class="hero-img">
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
